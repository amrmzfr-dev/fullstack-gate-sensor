# Frontend: build on GHA, stream image to VPS (no ghcr pull on server).
# develop -> dev only
# main    -> prod only
name: Frontend Deploy

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'frontend/**'
      - 'docker-compose.prod.yml'
      - 'docker-compose.dev.yml'
      - '.github/workflows/frontend-deploy.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  deploy-dev:
    if: github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - run: |
          cd frontend
          npm ci
          npx tsc --noEmit
      - run: echo "SHA_SHORT=$(git rev-parse --short HEAD)" >> $GITHUB_ENV
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: frontend
          push: true
          load: true
          no-cache: true
          build-args: |
            VITE_API_URL=/api
          tags: |
            ghcr.io/amrmzfr-dev/fullstack-gate-sensor-frontend:dev
            ghcr.io/amrmzfr-dev/fullstack-gate-sensor-frontend:dev-${{ env.SHA_SHORT }}
      - name: Deploy to dev VPS
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
        run: |
          set -euo pipefail
          SRC_IMAGE="ghcr.io/amrmzfr-dev/fullstack-gate-sensor-frontend:dev-${{ env.SHA_SHORT }}"
          DEPLOY_IMAGE="ghcr.io/amrmzfr-dev/fullstack-gate-sensor-frontend:dev"
          APP_DIR="/opt/gate-sensor-dev"
          COMPOSE_FILE="docker-compose.dev.yml"
          KEY_DIR="${RUNNER_TEMP}/deploy-ssh"
          mkdir -p "$KEY_DIR"
          printf '%s\n' "$VPS_SSH_KEY" > "$KEY_DIR/key"
          chmod 600 "$KEY_DIR/key"
          SSH_PORT="${VPS_PORT:-22}"
          SSH_BASE=(ssh -i "$KEY_DIR/key" -p "$SSH_PORT" -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null)
          scp -i "$KEY_DIR/key" -P "$SSH_PORT" -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
            "$COMPOSE_FILE" "${VPS_USER}@${VPS_HOST}:${APP_DIR}/${COMPOSE_FILE}"
          docker save "$SRC_IMAGE" | gzip -1 | "${SSH_BASE[@]}" "${VPS_USER}@${VPS_HOST}" 'gunzip -c | docker load'
          "${SSH_BASE[@]}" "${VPS_USER}@${VPS_HOST}" \
            "docker tag '$SRC_IMAGE' '$DEPLOY_IMAGE' && cd '$APP_DIR' && docker compose -f '$COMPOSE_FILE' stop frontend || true && docker compose -f '$COMPOSE_FILE' rm -f frontend || true && docker compose -f '$COMPOSE_FILE' up -d --no-deps frontend"

  deploy-prod:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - run: |
          cd frontend
          npm ci
          npx tsc --noEmit
      - run: echo "SHA_SHORT=$(git rev-parse --short HEAD)" >> $GITHUB_ENV
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: frontend
          push: true
          load: true
          no-cache: true
          build-args: |
            VITE_API_URL=/api
          tags: |
            ghcr.io/amrmzfr-dev/fullstack-gate-sensor-frontend:prod
            ghcr.io/amrmzfr-dev/fullstack-gate-sensor-frontend:prod-${{ env.SHA_SHORT }}
            ghcr.io/amrmzfr-dev/fullstack-gate-sensor-frontend:latest
      - name: Deploy to prod VPS
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
        run: |
          set -euo pipefail
          SRC_IMAGE="ghcr.io/amrmzfr-dev/fullstack-gate-sensor-frontend:prod-${{ env.SHA_SHORT }}"
          DEPLOY_IMAGE="ghcr.io/amrmzfr-dev/fullstack-gate-sensor-frontend:prod"
          APP_DIR="/opt/gate-sensor-prod"
          COMPOSE_FILE="docker-compose.prod.yml"
          KEY_DIR="${RUNNER_TEMP}/deploy-ssh"
          mkdir -p "$KEY_DIR"
          printf '%s\n' "$VPS_SSH_KEY" > "$KEY_DIR/key"
          chmod 600 "$KEY_DIR/key"
          SSH_PORT="${VPS_PORT:-22}"
          SSH_BASE=(ssh -i "$KEY_DIR/key" -p "$SSH_PORT" -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null)
          scp -i "$KEY_DIR/key" -P "$SSH_PORT" -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
            "$COMPOSE_FILE" "${VPS_USER}@${VPS_HOST}:${APP_DIR}/${COMPOSE_FILE}"
          docker save "$SRC_IMAGE" | gzip -1 | "${SSH_BASE[@]}" "${VPS_USER}@${VPS_HOST}" 'gunzip -c | docker load'
          "${SSH_BASE[@]}" "${VPS_USER}@${VPS_HOST}" \
            "docker tag '$SRC_IMAGE' '$DEPLOY_IMAGE' && cd '$APP_DIR' && docker compose -f '$COMPOSE_FILE' stop frontend || true && docker compose -f '$COMPOSE_FILE' rm -f frontend || true && docker compose -f '$COMPOSE_FILE' up -d --no-deps frontend"
